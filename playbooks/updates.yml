- hosts: wireguard
  become: true

  tasks:
    - name: Install unattended-upgrades
      apt:
        name:
          - unattended-upgrades
          - apt-listchanges
        state: present
        update_cache: true
        cache_valid_time: 86400
      
    - name: Configure automatic updates
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    - name: Disable automatic reboot
      lineinfile:
        path: /etc/apt/apt.conf.d/50unattended-upgrades
        regexp: '^//?\s*Unattended-Upgrade::Automatic-Reboot'
        line: 'Unattended-Upgrade::Automatic-Reboot "false";'

    - name: Reboot on Sunday at 04:00 if required
      cron:
        name: "Weekly reboot after updates"
        user: root
        minute: "0"
        hour: "4"
        weekday: "0"
        job: '[ -f /run/reboot-required ] && /sbin/reboot'